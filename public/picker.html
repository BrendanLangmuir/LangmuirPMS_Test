<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Warehouse Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #fff; font-family: system-ui, sans-serif; min-height: 100vh; padding: 24px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
  .brand { font-size: 20px; font-weight: 800; letter-spacing: 0.08em; }
  .brand span { color: #378ADD; }
  .clock { font-size: 16px; color: #aaa; font-weight: 600; }

  .summary { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .summary-card { background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 12px; padding: 12px 20px; text-align: center; min-width: 120px; }
  .summary-card .num  { font-size: 32px; font-weight: 800; color: #EF9F27; }
  .summary-card .lbl  { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .summary-card.urgent .num { color: #E24B4A; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid #333; background: #1a1a1a; color: #666; transition: all 0.2s; }
  .filter-btn.active { background: #378ADD; border-color: #378ADD; color: #fff; }
  .filter-btn:hover:not(.active) { border-color: #555; color: #aaa; }

  .queue { display: flex; flex-direction: column; gap: 10px; }
  .empty { text-align: center; color: #444; font-size: 15px; padding: 60px 0; }

  .req-card { background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; gap: 16px; transition: border-color 0.3s; }
  .req-card.apollo  { border-left: 4px solid #378ADD; }
  .req-card.xf      { border-left: 4px solid #9B6BCC; }
  .req-card.titan   { border-left: 4px solid #EF9F27; }
  .req-card.vulcan  { border-left: 4px solid #E24B4A; }
  .req-card.xr      { border-left: 4px solid #639922; }
  .req-card.mr1     { border-left: 4px solid #378ADD; }

  .req-main { flex: 1; min-width: 0; }
  .req-top  { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .req-line { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #378ADD; }
  .req-station { font-size: 11px; color: #555; }
  .req-time { font-size: 11px; color: #444; margin-left: auto; }
  .req-part { font-size: 15px; font-weight: 700; color: #eee; margin-bottom: 4px; word-break: break-word; }
  .req-partnum { font-size: 12px; color: #666; margin-bottom: 6px; }
  .req-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .req-meta-item { font-size: 12px; }
  .req-meta-item .meta-lbl { color: #555; }
  .req-meta-item .meta-val { color: #eee; font-weight: 600; margin-left: 4px; }
  .req-meta-item .meta-val.location { color: #EF9F27; }
  .req-qty-badge { background: #2a200a; border: 1px solid #EF9F2766; color: #EF9F27; font-size: 12px; font-weight: 700; border-radius: 8px; padding: 3px 10px; white-space: nowrap; }

  .req-card.over-stock { border-color: #E24B4A !important; background: #1a0a0a; }
  .over-stock-badge { background: #E24B4A; color: #fff; font-size: 10px; font-weight: 700; border-radius: 6px; padding: 2px 8px; margin-left: 6px; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand"><span>LANGMUIR</span> Warehouse Picker</div>
  <div class="clock" id="clock"></div>
</div>

<div class="summary">
  <div class="summary-card">
    <div class="num" id="total-count">0</div>
    <div class="lbl">Total Requests</div>
  </div>
  <div class="summary-card">
    <div class="num" id="apollo-count">0</div>
    <div class="lbl">Apollo</div>
  </div>
  <div class="summary-card">
    <div class="num" id="other-count">0</div>
    <div class="lbl">Other Lines</div>
  </div>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all')" id="filter-all">All Lines</button>
  <button class="filter-btn" onclick="setFilter('Apollo')" id="filter-Apollo">Apollo</button>
  <button class="filter-btn" onclick="setFilter('XF/PRO')"  id="filter-XF/PRO">XF/PRO</button>
  <button class="filter-btn" onclick="setFilter('TITAN')"   id="filter-TITAN">Titan</button>
  <button class="filter-btn" onclick="setFilter('VULCAN')"  id="filter-VULCAN">Vulcan</button>
  <button class="filter-btn" onclick="setFilter('XR')"      id="filter-XR">XR</button>
  <button class="filter-btn" onclick="setFilter('MR1')"     id="filter-MR1">MR1</button>
</div>

<div class="queue" id="queue">
  <div class="empty">No pending requests</div>
</div>

<script>
let requests = [], activeFilter = 'all';

const ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'?picker=1');
ws.onmessage = e => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'requests') { requests = msg.requests; render(); }
};

// Polling fallback
setInterval(async () => {
  try {
    const d = await (await fetch('/api/requests')).json();
    requests = d.requests; render();
  } catch {}
}, 3000);

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + (f === 'all' ? 'all' : f))?.classList.add('active');
  render();
}

function fulfill(id) {
  ws.send(JSON.stringify({ type: 'fulfill', reqId: id }));
}

function lineClass(line) {
  const map = { 'Apollo':'apollo','XF/PRO':'xf','TITAN':'titan','VULCAN':'vulcan','XR':'xr','MR1':'mr1' };
  return map[line] || 'apollo';
}

function render() {
  const filtered = activeFilter === 'all' ? requests : requests.filter(r => r.line === activeFilter);
  const apolloN  = requests.filter(r => r.line === 'Apollo').length;
  const otherN   = requests.filter(r => r.line !== 'Apollo').length;

  document.getElementById('total-count').textContent  = requests.length;
  document.getElementById('apollo-count').textContent = apolloN;
  document.getElementById('other-count').textContent  = otherN;

  const queue = document.getElementById('queue');
  if (!filtered.length) { queue.innerHTML = '<div class="empty">No pending requests</div>'; return; }

  queue.innerHTML = filtered.map(r => {
    const partLabel = r.partNum && r.partName ? r.partNum + ' — ' + r.partName : r.text;
    const partNum   = r.partNum || '';
    return `<div class="req-card ${lineClass(r.line)}${r.overStock ? ' over-stock' : ''}">
      <div class="req-main">
        <div class="req-top">
          <span class="req-line">${esc(r.line)}</span>
          ${r.station ? `<span class="req-station">· ${esc(r.station)}</span>` : ''}
          ${r.overStock ? `<span class="over-stock-badge">⚠️ OVER STOCK</span>` : ''}
          <span class="req-time">${r.time}</span>
        </div>
        <div class="req-part">${esc(partLabel)}</div>
        ${partNum ? `<div class="req-partnum">${esc(partNum)}</div>` : ''}
        <div class="req-meta">
          <div class="req-meta-item">
            <span class="meta-lbl">Location:</span>
            <span class="meta-val location">${esc(r.location || '—')}</span>
          </div>
          <div class="req-meta-item">
            <span class="meta-lbl">In stock:</span>
            <span class="meta-val">${esc(r.stockQty || '—')}</span>
          </div>
          <span class="req-qty-badge">Qty: ${esc(String(r.qty || 1))}</span>
        </div>
      </div>
      <button class="fulfill-btn" onclick="fulfill(${r.id})">✓ Picked</button>
    </div>`;
  }).join('');
}

// Clock
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
updateClock(); setInterval(updateClock, 1000);

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>

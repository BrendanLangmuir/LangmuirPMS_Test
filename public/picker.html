<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Warehouse Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1e24;
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: #12151a;
    border-bottom: 3px solid #C8102E;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-icon {
    width: 36px; height: 36px;
    background: #C8102E;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 16px; color: #fff;
    flex-shrink: 0;
  }
  .brand-text { line-height: 1.1; }
  .brand-text .top { font-size: 11px; font-weight: 600; color: #C8102E; letter-spacing: 0.15em; text-transform: uppercase; }
  .brand-text .btm { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.06em; text-transform: uppercase; }
  .header-right { text-align: right; }
  .clock { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
  .date  { font-size: 11px; color: #6b7280; margin-top: 2px; }

  .conn-status { display: none; width: 100%; background: #7f1d1d; border-bottom: 2px solid #C8102E; padding: 10px 24px; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fca5a5; text-transform: uppercase; letter-spacing: 0.08em; } padding: 28px; }

  /* ── Summary ── */
  .summary-bar {
    background: #12151a;
    border: 1px solid #2d3340;
    border-left: 4px solid #C8102E;
    border-radius: 8px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .summary-label { font-size: 13px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; }
  .summary-num   { font-size: 36px; font-weight: 900; color: #C8102E; line-height: 1; margin-left: 4px; }
  .summary-unit  { font-size: 13px; color: #6b7280; margin-left: 4px; }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-btn {
    padding: 7px 18px; border-radius: 4px; font-size: 12px; font-weight: 700;
    cursor: pointer; border: 1.5px solid #2d3340; background: #12151a;
    color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .filter-btn.active { background: #C8102E; border-color: #C8102E; color: #fff; }
  .filter-btn:hover:not(.active) { border-color: #C8102E; color: #fff; }

  /* ── Queue ── */
  .queue { display: flex; flex-direction: column; gap: 12px; }
  .empty {
    text-align: center; color: #4b5563; font-size: 15px;
    padding: 80px 0; text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* ── Request card ── */
  .req-card {
    background: #12151a;
    border: 1px solid #2d3340;
    border-radius: 8px;
    overflow: hidden;
  }
  .req-card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid #2d3340;
  }
  .line-tag {
    font-size: 10px; font-weight: 800; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 3px 10px; border-radius: 3px;
    flex-shrink: 0;
  }
  .line-tag.apollo { background: #1e3a5f; color: #60a5fa; }
  .line-tag.xf     { background: #2d1b4e; color: #a78bfa; }
  .line-tag.titan  { background: #3d1f00; color: #fb923c; }
  .line-tag.vulcan { background: #3d0a0a; color: #f87171; }
  .line-tag.xr     { background: #1a3d1a; color: #4ade80; }
  .line-tag.mr1    { background: #3d2a00; color: #fbbf24; }

  .req-station { font-size: 12px; color: #6b7280; }
  .req-time    { font-size: 11px; color: #4b5563; margin-left: auto; }

  .req-body { padding: 14px 18px; }
  .req-part    { font-size: 17px; font-weight: 800; color: #fff; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.02em; }
  .req-partnum { font-size: 12px; color: #C8102E; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 12px; }

  .req-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .qty-badge {
    background: #1f2937; border: 1px solid #374151;
    color: #d1d5db; font-size: 12px; font-weight: 700;
    border-radius: 4px; padding: 4px 12px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .total-stock { font-size: 12px; color: #6b7280; }
  .total-stock span { color: #9ca3af; font-weight: 600; }

  /* ── Location rows ── */
  .loc-section { display: flex; flex-direction: column; gap: 6px; }
  .loc-row {
    display: flex; align-items: center; gap: 12px;
    background: #1f2937; border: 1px solid #374151;
    border-radius: 6px; padding: 10px 14px;
  }
  .loc-code {
    font-size: 14px; font-weight: 800; color: #fff;
    letter-spacing: 0.06em; flex: 1;
    font-family: 'Courier New', monospace;
  }
  .loc-qty { font-size: 13px; font-weight: 700; min-width: 80px; text-align: right; }
  .loc-qty.ok  { color: #4ade80; }
  .loc-qty.low { color: #f87171; }
  .pick-btn {
    background: #C8102E; border: none; border-radius: 4px;
    color: #fff; font-size: 12px; font-weight: 800;
    padding: 8px 18px; cursor: pointer; white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.08em;
    transition: background 0.15s;
  }
  .pick-btn:hover  { background: #a00d24; }
  .pick-btn:active { transform: scale(0.97); }

  .no-loc { font-size: 12px; color: #4b5563; font-style: italic; padding: 8px 0; }
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-icon">L</div>
    <div class="brand-text">
      <div class="top">Langmuir Systems</div>
      <div class="btm">Warehouse Picker</div>
    </div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock"></div>
    <div class="date"  id="date"></div>
  </div>
</div>

<div class="conn-status" id="conn-status">⚠ Connection lost — reconnecting...</div>

<div class="conn-status" id="conn-status">⚠ Connection lost — reconnecting...</div>

<div class="page">

  <div class="summary-bar">
    <span class="summary-label">Pending Requests</span>
    <span class="summary-num" id="total-count">0</span>
    <span class="summary-unit">items</span>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all')"   id="filter-all">All Lines</button>
    <button class="filter-btn" onclick="setFilter('Apollo')"  id="filter-Apollo">Apollo</button>
    <button class="filter-btn" onclick="setFilter('XF/PRO')"  id="filter-XF/PRO">XF/PRO</button>
    <button class="filter-btn" onclick="setFilter('TITAN')"   id="filter-TITAN">Titan</button>
    <button class="filter-btn" onclick="setFilter('VULCAN')"  id="filter-VULCAN">Vulcan</button>
    <button class="filter-btn" onclick="setFilter('XR')"      id="filter-XR">XR</button>
    <button class="filter-btn" onclick="setFilter('MR1')"     id="filter-MR1">MR1</button>
  </div>

  <div class="queue" id="queue">
    <div class="empty">— No Pending Requests —</div>
  </div>

</div>

<script>
var requests      = [];
var locationsData = [];
var activeFilter  = 'all';
var pickMap       = {};
var pickKey       = 0;

var ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'?picker=1');
ws.onmessage = function(e) {
  var msg = JSON.parse(e.data);
  if (msg.type === 'requests')  { requests = msg.requests; render(); }
  if (msg.type === 'locations') { locationsData = msg.locations; render(); }
};

setInterval(function() {
  fetch('/api/requests').then(function(r){return r.json();}).then(function(d){
    requests = d.requests; render();
  }).catch(function(){});
}, 3000);

function loadLocations() {
  fetch('/api/locations').then(function(r){return r.json();}).then(function(d){
    if (d.success && d.locations) { locationsData = d.locations; render(); }
  }).catch(function(){});
}
loadLocations();
setInterval(loadLocations, 30000);

function getLocsForPart(partNum) {
  if (!partNum) return [];
  return locationsData.filter(function(l) {
    return l.partNum.toLowerCase() === partNum.toLowerCase();
  });
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  var el = document.getElementById('filter-' + f);
  if (el) el.classList.add('active');
  render();
}

function handlePick(key) {
  var entry = pickMap[key];
  if (!entry) return;
  console.log('Picking:', entry.reqId, entry.location);
  ws.send(JSON.stringify({ type: 'fulfill', reqId: entry.reqId, location: entry.location }));
}

function lineClass(line) {
  var map = { 'Apollo':'apollo','APOLLO':'apollo','XF/PRO':'xf','TITAN':'titan','VULCAN':'vulcan','XR':'xr','MR1':'mr1' };
  return map[line] || 'apollo';
}

function render() {
  var filtered = activeFilter === 'all'
    ? requests
    : requests.filter(function(r){ return r.line === activeFilter; });

  document.getElementById('total-count').textContent = requests.length;

  var queue = document.getElementById('queue');
  if (!filtered.length) {
    queue.innerHTML = '<div class="empty">— No Pending Requests —</div>';
    return;
  }

  pickMap = {}; pickKey = 0;

  var html = filtered.map(function(r) {
    var partLabel = (r.partNum && r.partName) ? r.partNum + ' — ' + r.partName : (r.text || '');
    var qtyNeeded = r.qty || 1;
    var locs      = getLocsForPart(r.partNum);
    var totalQty  = locs.reduce(function(s,l){ return s + (parseInt(l.quantity)||0); }, 0);

    var locHtml = locs.length ? locs.map(function(l) {
      var lq    = parseInt(l.quantity) || 0;
      var isLow = lq < qtyNeeded;
      var key   = pickKey++;
      pickMap[key] = { reqId: r.id, location: l.location };
      return '<div class="loc-row">' +
        '<span class="loc-code">' + esc(l.location) + '</span>' +
        '<span class="loc-qty ' + (isLow?'low':'ok') + '">' + (isLow?'⚠️ ':'') + lq + ' in stock</span>' +
        '<button class="pick-btn" onclick="handlePick(' + key + ')">✓ Pick</button>' +
        '</div>';
    }).join('') : '<div class="no-loc">No warehouse location on file</div>';

    return '<div class="req-card">' +
      '<div class="req-card-header">' +
        '<span class="line-tag ' + lineClass(r.line) + '">' + esc(r.line) + '</span>' +
        (r.station ? '<span class="req-station">' + esc(r.station) + '</span>' : '') +
        '<span class="req-time">' + r.time + '</span>' +
      '</div>' +
      '<div class="req-body">' +
        '<div class="req-part">' + esc(r.partName || r.text || '') + '</div>' +
        (r.partNum ? '<div class="req-partnum">' + esc(r.partNum) + '</div>' : '') +
        '<div class="req-meta">' +
          '<span class="qty-badge">Qty needed: ' + qtyNeeded + '</span>' +
          (locs.length ? '<span class="total-stock">Total stock: <span>' + totalQty + '</span></span>' : '') +
        '</div>' +
        '<div class="loc-section">' + locHtml + '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  queue.innerHTML = html;
}

function updateClock() {
  var now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('date').textContent =
    now.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'});
}
updateClock(); setInterval(updateClock, 1000);

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>

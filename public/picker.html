<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Warehouse</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1e24; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  .header { background: #12151a; border-bottom: 3px solid #C8102E; padding: 0 24px; display: flex; align-items: stretch; justify-content: space-between; min-height: 60px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .brand-icon { width: 36px; height: 36px; background: #C8102E; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: #fff; flex-shrink: 0; }
  .brand-text .top { font-size: 9px; font-weight: 700; color: #C8102E; letter-spacing: 0.15em; text-transform: uppercase; }
  .brand-text .btm { font-size: 16px; font-weight: 800; color: #fff; letter-spacing: 0.06em; text-transform: uppercase; }
  .clock { font-size: 15px; font-weight: 700; color: #9ca3af; }

  .conn-status { display: none; width: 100%; background: #7f1d1d; border-bottom: 2px solid #C8102E; padding: 10px 24px; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fca5a5; text-transform: uppercase; letter-spacing: 0.08em; }

  .tab-bar { display: flex; background: #12151a; border-bottom: 1px solid #2d3340; }
  .tab { flex: 1; padding: 14px 8px; font-size: 12px; font-weight: 800; cursor: pointer; color: #6b7280; border: none; background: none; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: all 0.15s; text-align: center; }
  .tab.active { color: #fff; border-bottom-color: #C8102E; }
  .tab:hover:not(.active) { color: #9ca3af; }

  .page { padding: 20px 24px; max-width: 600px; margin: 0 auto; }

  .summary-bar { background: #12151a; border: 1px solid #2d3340; border-left: 4px solid #C8102E; border-radius: 6px; padding: 12px 18px; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .summary-num   { font-size: 32px; font-weight: 900; color: #C8102E; line-height: 1; }
  .summary-label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; margin-left: 4px; }

  .filter-bar { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border-radius: 4px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid #2d3340; background: #12151a; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; transition: all 0.15s; }
  .filter-btn.active { background: #C8102E; border-color: #C8102E; color: #fff; }
  .filter-btn:hover:not(.active) { border-color: #C8102E; color: #fff; }

  .queue { display: flex; flex-direction: column; gap: 10px; }
  .empty { text-align: center; color: #374151; font-size: 13px; padding: 60px 0; text-transform: uppercase; letter-spacing: 0.1em; }

  .req-card { background: #12151a; border: 1px solid #2d3340; border-radius: 8px; overflow: hidden; }
  .req-card-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #2d3340; flex-wrap: wrap; }
  .line-tag { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; flex-shrink: 0; }
  .line-tag.apollo { background: #1e3a5f; color: #60a5fa; }
  .line-tag.xf     { background: #2d1b4e; color: #a78bfa; }
  .line-tag.titan  { background: #3d1f00; color: #fb923c; }
  .line-tag.vulcan { background: #3d0a0a; color: #f87171; }
  .line-tag.xr     { background: #1a3d1a; color: #4ade80; }
  .line-tag.mr1    { background: #3d2a00; color: #fbbf24; }
  .line-tag.shipping { background: #0f3d3d; color: #5eead4; }
  .req-station { font-size: 11px; color: #6b7280; }
  .req-time    { font-size: 10px; color: #374151; margin-left: auto; }
  .req-queue-pos { font-size: 11px; font-weight: 800; color: #EF9F27; letter-spacing: 0.06em; padding: 2px 8px; border: 1px solid #EF9F27; border-radius: 3px; }
  .req-elapsed { font-size: 10px; font-weight: 700; color: #9ca3af; }

  .pri-badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; }
  .pri-badge.low    { background: #1f2937; color: #6b7280; }
  .pri-badge.medium { background: #2d1f00; color: #EF9F27; }
  .pri-badge.high   { background: #2d0808; color: #f87171; animation: flash-red 1s ease-in-out infinite; }
  @keyframes flash-red { 0%,100%{opacity:1}50%{opacity:0.5} }

  .req-body    { padding: 12px 14px; }
  .req-part    { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 2px; text-transform: uppercase; }
  .req-partnum { font-size: 11px; color: #C8102E; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 8px; }
  .req-meta    { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .qty-badge   { background: #1f2937; border: 1px solid #374151; color: #d1d5db; font-size: 11px; font-weight: 700; border-radius: 3px; padding: 3px 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .remaining-badge { font-size: 11px; font-weight: 800; border-radius: 3px; padding: 3px 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .remaining-badge.partial { background: #2d1f00; border: 1px solid #92400e; color: #EF9F27; }
  .remaining-badge.done    { background: #052e16; border: 1px solid #166534; color: #4ade80; }
  .stock-info  { font-size: 11px; color: #6b7280; }
  .stock-info span { color: #9ca3af; font-weight: 600; }

  .loc-section { display: flex; flex-direction: column; gap: 6px; }
  .loc-row { background: #1f2937; border: 1px solid #374151; border-radius: 6px; padding: 10px 12px; }
  .loc-row.exhausted { opacity: 0.45; }
  .loc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .loc-code { font-size: 14px; font-weight: 800; color: #fff; flex: 1; font-family: 'Courier New', monospace; letter-spacing: 0.06em; }
  .loc-qty-txt { font-size: 12px; font-weight: 700; }
  .loc-qty-txt.ok  { color: #4ade80; }
  .loc-qty-txt.low { color: #f87171; }
  .loc-pick-row { display: flex; align-items: center; gap: 8px; }
  .pick-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; flex: 1; }
  .adj-btn { width: 32px; height: 32px; border-radius: 4px; border: 1px solid #374151; background: #12151a; color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .adj-btn:hover:not(:disabled) { background: #374151; }
  .adj-btn:disabled { opacity: 0.3; cursor: default; }
  .adj-val { font-size: 16px; font-weight: 900; width: 52px; text-align: center; background: #12151a; border: 1px solid #374151; border-radius: 4px; color: #fff; padding: 4px 6px; -moz-appearance: textfield; }
  .adj-val::-webkit-outer-spin-button, .adj-val::-webkit-inner-spin-button { -webkit-appearance: none; }
  .adj-val:focus { outline: none; border-color: #C8102E; }
  .pick-btn { border: none; border-radius: 4px; color: #fff; font-size: 11px; font-weight: 800; padding: 8px 14px; cursor: pointer; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.06em; }
  .pick-btn.active       { background: #C8102E; }
  .pick-btn.active:hover { background: #a00d24; }
  .pick-btn.exhausted-btn { background: #374151; color: #6b7280; cursor: default; }
  .picked-from-note { font-size: 10px; color: #4ade80; margin-top: 6px; }

  /* ── Recently completed ── */
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #6b7280; margin: 20px 0 10px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: #2d3340; }
  .recent-pick-card { background: #12151a; border: 1px solid #2d3340; border-left: 3px solid #4ade80; border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; }
  .recent-pick-part { font-size: 13px; font-weight: 800; color: #fff; margin-bottom: 2px; }
  .recent-pick-meta { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.06em; display: flex; gap: 10px; flex-wrap: wrap; }
  .recent-pick-loc  { font-family: 'Courier New', monospace; color: #4ade80; font-weight: 700; font-size: 11px; }

  /* ── Stow form ── */
  .card { background: #12151a; border: 1px solid #2d3340; border-radius: 8px; padding: 18px; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 10px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  input[type="text"], input[type="number"] { width: 100%; background: #1f2937; border: 1.5px solid #374151; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; padding: 11px 14px; outline: none; }
  input:focus { border-color: #C8102E; }
  input::placeholder { color: #4b5563; }
  .qty-row { display: flex; align-items: center; gap: 10px; }
  .qty-btn { width: 40px; height: 40px; border-radius: 6px; border: 1.5px solid #374151; background: #1f2937; color: #fff; font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .qty-btn:hover { background: #374151; }
  .qty-input { flex: 1; }
  .send-btn { width: 100%; padding: 14px; border-radius: 6px; border: none; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; background: #C8102E; color: #fff; }
  .send-btn:hover { background: #a00d24; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }
  .stow-results { background: #1f2937; border: 1.5px solid #374151; border-radius: 6px; max-height: 200px; overflow-y: auto; margin-bottom: 10px; display: none; }
  .stow-result-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #2d3340; }
  .stow-result-item:last-child { border-bottom: none; }
  .stow-result-item:hover { background: #374151; }
  .stow-result-pn { font-size: 12px; font-weight: 800; color: #C8102E; letter-spacing: 0.06em; }
  .stow-result-pa { font-size: 13px; color: #d1d5db; margin-top: 2px; }
  .stow-selected { background: #12151a; border: 1.5px solid #C8102E; border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; display: none; }
  .stow-selected-lbl { font-size: 9px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
  .stow-selected-pn  { font-size: 12px; font-weight: 800; color: #C8102E; }
  .stow-selected-pa  { font-size: 13px; color: #fff; margin-top: 2px; }
  .stow-clear { float: right; background: none; border: none; color: #6b7280; cursor: pointer; font-size: 12px; font-weight: 700; text-transform: uppercase; }
  .stow-clear:hover { color: #f87171; }

  /* ── Existing locations for stow ── */
  .existing-locs { margin-bottom: 14px; }
  .existing-locs-title { font-size: 10px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .existing-loc-row { display: flex; align-items: center; justify-content: space-between; background: #1f2937; border: 1px solid #374151; border-radius: 4px; padding: 8px 12px; margin-bottom: 4px; }
  .existing-loc-code { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.06em; }
  .existing-loc-qty  { font-size: 12px; font-weight: 700; color: #4ade80; }

  .result-flash { display: none; border-radius: 6px; padding: 11px; margin-bottom: 12px; font-size: 13px; font-weight: 800; text-align: center; }
  .result-flash.success { background: #052e16; border: 1px solid #166534; color: #4ade80; }
  .result-flash.error   { background: #2d0808; border: 1px solid #7f1d1d; color: #f87171; }
  .recent-item { background: #12151a; border: 1px solid #2d3340; border-left: 3px solid #EF9F27; border-radius: 4px; padding: 10px 14px; margin-bottom: 6px; }
  .recent-part { font-size: 13px; font-weight: 700; color: #fff; }
  .recent-meta { font-size: 10px; color: #4b5563; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── Transfer tab ── */
  .search-wrap { margin-bottom: 16px; }
  .search-wrap input { width: 100%; background: #1f2937; border: 1.5px solid #374151; border-radius: 6px; color: #fff; font-size: 14px; padding: 12px 14px; outline: none; }
  .search-wrap input:focus { border-color: #C8102E; }
  .search-wrap input::placeholder { color: #4b5563; }
  .transfer-result-card { background: #12151a; border: 1px solid #2d3340; border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
  .transfer-result-header { padding: 12px 14px; border-bottom: 1px solid #2d3340; }
  .transfer-result-pn { font-size: 13px; font-weight: 800; color: #C8102E; letter-spacing: 0.06em; }
  .transfer-result-pa { font-size: 14px; font-weight: 700; color: #fff; margin-top: 2px; }
  .transfer-result-body { padding: 12px 14px; }
  .transfer-lines { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .transfer-line-tag { font-size: 10px; font-weight: 800; padding: 2px 10px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; }
  .transfer-line-tag.apollo { background: #1e3a5f; color: #60a5fa; }
  .transfer-line-tag.xf     { background: #2d1b4e; color: #a78bfa; }
  .transfer-line-tag.titan  { background: #3d1f00; color: #fb923c; }
  .transfer-line-tag.vulcan { background: #3d0a0a; color: #f87171; }
  .transfer-line-tag.xr     { background: #1a3d1a; color: #4ade80; }
  .transfer-line-tag.mr1    { background: #3d2a00; color: #fbbf24; }
  .transfer-line-tag.shipping { background: #0f3d3d; color: #5eead4; }
  .transfer-line-tag.unassigned { background: #1e1535; color: #a78bfa; }
  .transfer-loc-row { background: #1f2937; border: 1px solid #374151; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; }
  .transfer-loc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 0; }
  .transfer-loc-code { font-family: 'Courier New', monospace; font-size: 14px; font-weight: 700; color: #fff; flex: 1; }
  .transfer-loc-qty  { font-size: 12px; font-weight: 700; }
  .transfer-loc-qty.ok  { color: #4ade80; }
  .transfer-loc-qty.low { color: #f87171; }
  .transfer-from-btn { background: #1f2937; border: 1.5px solid #374151; border-radius: 4px; color: #9ca3af; font-size: 11px; font-weight: 800; padding: 6px 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .transfer-from-btn:hover { border-color: #C8102E; color: #fff; }
  .transfer-from-btn.selected { background: #2d0808; border-color: #C8102E; color: #f87171; }
  .transfer-form { background: #12151a; border: 1.5px solid #C8102E; border-radius: 8px; padding: 16px; margin-top: 16px; }
  .transfer-form-title { font-size: 10px; font-weight: 700; color: #C8102E; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px; }
  .transfer-from-info { background: #1f2937; border-radius: 6px; padding: 10px 12px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .transfer-from-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
  .transfer-from-loc { font-family: 'Courier New', monospace; font-size: 14px; font-weight: 800; color: #fff; }
  .transfer-from-avail { font-size: 11px; color: #4ade80; font-weight: 700; }
  .transfer-qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .transfer-qty-label { font-size: 10px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .transfer-qty-input { flex: 1; background: #1f2937; border: 1.5px solid #374151; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; padding: 10px 14px; outline: none; -moz-appearance: textfield; }
  .transfer-qty-input::-webkit-outer-spin-button, .transfer-qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .transfer-qty-input:focus { border-color: #C8102E; }
  .transfer-dest-label { font-size: 10px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .transfer-dest-input { width: 100%; background: #1f2937; border: 1.5px solid #374151; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; padding: 10px 14px; outline: none; margin-bottom: 14px; }
  .transfer-dest-input:focus { border-color: #C8102E; }
  .transfer-dest-input::placeholder { color: #4b5563; }
  .transfer-confirm-btn { width: 100%; padding: 13px; border-radius: 6px; border: none; font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; background: #C8102E; color: #fff; }
  .transfer-confirm-btn:hover { background: #a00d24; }
  .transfer-confirm-btn:disabled { opacity: 0.4; cursor: default; }
  .transfer-flash { border-radius: 6px; padding: 11px; margin-bottom: 12px; font-size: 13px; font-weight: 800; text-align: center; display: none; }
  .transfer-flash.success { background: #052e16; border: 1px solid #166534; color: #4ade80; }
  .transfer-flash.error   { background: #2d0808; border: 1px solid #7f1d1d; color: #f87171; }
  .transfer-total { font-size: 11px; color: #6b7280; margin-top: 8px; text-align: right; }
  .search-empty { text-align: center; color: #374151; font-size: 13px; padding: 40px 0; text-transform: uppercase; letter-spacing: 0.1em; }
  .transfer-loc-out { background: #2d0808; border: 1px solid #7f1d1d; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; font-size: 12px; color: #f87171; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .escalation-badge { background: #2d0808; border: 1px solid #7f1d1d; color: #f87171; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; animation: flash-red 1s ease-in-out infinite; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="brand-icon">L</div>
    <div class="brand-text">
      <div class="top">Langmuir Systems</div>
      <div class="btm">Warehouse</div>
    </div>
  </div>
  <div class="clock" id="clock"></div>
</div>

<div class="conn-status" id="conn-status">⚠ Connection lost — reconnecting...</div>

<div class="tab-bar">
  <button class="tab active" onclick="showTab('pick')"   id="tab-pick">📦 Pick Queue</button>
  <button class="tab"        onclick="showTab('stow')"   id="tab-stow">📥 Stow</button>
  <button class="tab"        onclick="showTab('transfer')" id="tab-transfer">↔ Transfer</button>
</div>

<!-- PICK TAB -->
<div id="view-pick" class="page">
  <div class="summary-bar">
    <span class="summary-num" id="total-count">0</span>
    <span class="summary-label">Pending Requests</span>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all')"      id="filter-all">All</button>
    <button class="filter-btn" onclick="setFilter('Apollo')"     id="filter-Apollo">Apollo</button>
    <button class="filter-btn" onclick="setFilter('XF/PRO')"    id="filter-XF/PRO">XF/PRO</button>
    <button class="filter-btn" onclick="setFilter('TITAN')"     id="filter-TITAN">Titan</button>
    <button class="filter-btn" onclick="setFilter('VULCAN')"    id="filter-VULCAN">Vulcan</button>
    <button class="filter-btn" onclick="setFilter('XR')"        id="filter-XR">XR</button>
    <button class="filter-btn" onclick="setFilter('MR1')"       id="filter-MR1">MR1</button>
    <button class="filter-btn" onclick="setFilter('Shipping')"  id="filter-Shipping">Shipping</button>
    <button class="filter-btn" onclick="setFilter('Unassigned')" id="filter-Unassigned">Unassigned</button>
  </div>
  <div class="queue" id="queue"><div class="empty">— No Pending Requests —</div></div>

  <!-- Recently completed -->
  <div id="recent-picks-section" style="display:none">
    <div class="section-label">Recently completed</div>
    <div id="recent-picks-list"></div>
  </div>
</div>

<!-- STOW TAB -->
<div id="view-stow" class="page" style="display:none">
  <div class="section-label" style="margin-top:0;">Stow a part</div>
  <div class="card">
    <div id="result-flash" class="result-flash"></div>
    <div class="field">
      <label>Search Part Number or Description</label>
      <input type="text" id="stow-search" placeholder="Type part # or description..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      <div style="height:8px"></div>
      <div class="stow-results" id="stow-results"></div>
      <div class="stow-selected" id="stow-selected">
        <div class="stow-selected-lbl">Selected Part <button class="stow-clear" onclick="clearStowPart()">✕ Clear</button></div>
        <div class="stow-selected-pn" id="stow-sel-pn"></div>
        <div class="stow-selected-pa" id="stow-sel-pa"></div>
      </div>
    </div>

    <!-- Existing locations for this part -->
    <div class="existing-locs" id="existing-locs" style="display:none">
      <div class="existing-locs-title">Currently stowed at</div>
      <div id="existing-locs-list"></div>
    </div>

    <div class="field">
      <label>Shelf Location <span style="font-weight:400;color:#4b5563;text-transform:none;letter-spacing:0;">(e.g. 01-A1-A)</span></label>
      <input type="text" id="location-sel" placeholder="e.g. 01-A1-A" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
    </div>
    <div class="field">
      <label>Quantity</label>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input class="qty-input" type="number" id="qty-stow" inputmode="numeric" min="1" value="1"/>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>
    <button class="send-btn" id="stow-btn" onclick="stowPart()">📥 Stow Part</button>
  </div>
  <div class="section-label">Recently stowed</div>
  <div id="recent-list"></div>
</div>

<!-- TRANSFER TAB -->
<div id="view-transfer" class="page" style="display:none">
  <div class="search-wrap">
    <input type="text" id="transfer-search-input" placeholder="Search part #, description, or bin location (e.g. 01-A1-A)..." autocomplete="off" spellcheck="false"/>
  </div>
  <div class="transfer-flash" id="transfer-flash"></div>
  <div id="transfer-results"><div class="search-empty">— Search a part or bin location to transfer —</div></div>
</div>

<script>
var requests      = [];
var locationsData = [];
var activeFilter  = 'all';
var pickMap       = {};
var pickKey       = 0;
var recentStows   = [];
var recentPicks   = [];
var lastPong      = Date.now();
var adjustedQtys  = {};
var stowSelected  = null;
var allStowParts  = [];
var inventoryData = {};
var orphanData    = {};
var epicorOnHand  = {};       // {partNumLower: qty} from Epicor BAQ
var epicorLastRefresh = null;

// ── Request update handler ────────────────────────────────────
// Structure preserved so we can add notification sound later (e.g. in a
// native app wrapper where audio autoplay is permitted).
function handleRequestsUpdate(list) {
  requests = list || [];
  renderQueue();
}

// ── Elapsed time helpers ──────────────────────────────────────
function fmtElapsed(submittedAt) {
  if (!submittedAt) return '';
  var sec = Math.max(0, Math.floor((Date.now() - submittedAt) / 1000));
  var m = Math.floor(sec / 60), s = sec % 60;
  if (m < 60) return m + 'm ' + s + 's';
  var h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}
setInterval(function() {
  document.querySelectorAll('.req-elapsed[data-submitted]').forEach(function(el) {
    var t = parseInt(el.getAttribute('data-submitted'), 10);
    if (t) el.textContent = fmtElapsed(t);
  });
}, 1000);

// ── WebSocket ─────────────────────────────────────────────────
var ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'?picker=1');
ws.onopen  = function() { document.getElementById('conn-status').style.display = 'none'; };
ws.onclose = function() { document.getElementById('conn-status').style.display = 'flex'; setTimeout(function(){ location.reload(); }, 3000); };
ws.onerror = function() { document.getElementById('conn-status').style.display = 'flex'; };
ws.onmessage = function(e) {
  lastPong = Date.now();
  var msg = JSON.parse(e.data);
  if (msg.type === 'requests')     { handleRequestsUpdate(msg.requests); }
  if (msg.type === 'locations')    { locationsData = msg.locations; renderQueue(); }
  if (msg.type === 'stow-result')     { handleStowResult(msg); }
  if (msg.type === 'transfer-result') { handleTransferResult(msg); }
  if (msg.type === 'recent-picks') { recentPicks = msg.recentPicks || []; renderRecentPicks(); }
};
setInterval(function() { if (ws.readyState === 1) ws.send(JSON.stringify({ type: 'ping' })); }, 25000);
setInterval(function() { if (Date.now() - lastPong > 35000) location.reload(); }, 5000);
setInterval(function() {
  fetch('/api/requests').then(function(r){return r.json();}).then(function(d){ handleRequestsUpdate(d.requests); }).catch(function(){});
}, 8000);
setInterval(function() {
  fetch('/api/recent-picks').then(function(r){return r.json();}).then(function(d){ if (d.success) { recentPicks = d.recentPicks || []; renderRecentPicks(); }}).catch(function(){});
}, 30000);

function loadLocations() {
  fetch('/api/locations').then(function(r){return r.json();}).then(function(d){
    if (d.success && d.locations) { locationsData = d.locations; renderQueue(); }
  }).catch(function(){});
}
loadLocations();
setInterval(loadLocations, 30000);

// Load full inventory for search tab
fetch('/api/inventory').then(function(r){return r.json();}).then(function(d){
  if (d.success) {
    inventoryData = d.inventory || {};
    epicorOnHand = d.epicorOnHand || {};
    epicorLastRefresh = d.epicorLastRefresh || null;
    renderQueue();
  }
}).catch(function(){});
fetch('/api/orphans').then(function(r){return r.json();}).then(function(d){
  if (d.success) { orphanData = d; }
}).catch(function(){});

// 60s independent Epicor poll. Cheaper than re-fetching the full inventory;
// updates the on-hand map in place and re-renders the queue so pick cards
// reflect fresh data.
function pollEpicor() {
  fetch('/api/epicor-onhand').then(function(r){ return r.json(); }).then(function(d) {
    if (d && d.success) {
      epicorOnHand = d.onHand || {};
      epicorLastRefresh = d.lastRefresh || null;
      renderQueue();
      // If a part is currently selected on stow/transfer, refresh that view too
      if (stowSelected && !stowSelected.isBundle) refreshStowEpicor();
    }
  }).catch(function(){});
}
setInterval(pollEpicor, 60000);

// Returns formatted string for display in the "Factory on-hand" line.
function epicorLabel(partNum) {
  if (!partNum) return '—';
  var v = epicorOnHand[String(partNum).toLowerCase()];
  if (v === undefined) return '—';
  var n = Number(v);
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}

// Update the on-hand display in the stow panel without rebuilding the whole UI.
function refreshStowEpicor() {
  var el = document.getElementById('stow-epicor');
  if (el && stowSelected && !stowSelected.isBundle) {
    el.textContent = 'Factory on-hand: ' + epicorLabel(stowSelected.partNum);
  }
}

// ── Tabs ──────────────────────────────────────────────────────
function showTab(tab) {
  ['pick','stow','transfer'].forEach(function(t) {
    document.getElementById('view-'+t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-'+t).className = 'tab' + (t === tab ? ' active' : '');
  });
}

// ── Filter ────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  var el = document.getElementById('filter-' + f);
  if (el) el.classList.add('active');
  renderQueue();
}

// ── Pick helpers ──────────────────────────────────────────────
function getLocsForPart(partNum) {
  if (!partNum) return [];
  return locationsData.filter(function(l) { return l.partNum.toLowerCase() === partNum.toLowerCase(); });
}
function adjQty(key, delta) {
  var entry = pickMap[key];
  if (!entry || entry.exhausted) return;
  var el = document.getElementById('pick-qty-' + key);
  if (!el) return;
  var next = Math.max(0, Math.min((parseInt(el.value) || 0) + delta, entry.availableQty));
  el.value = next; entry.qty = next;
  adjustedQtys[entry.reqId + '|' + entry.location] = next;
}
function handleQtyInput(key) {
  // Fires on every keystroke — allow empty/mid-edit, only enforce the MAX here.
  var entry = pickMap[key];
  if (!entry || entry.exhausted) return;
  var el = document.getElementById('pick-qty-' + key);
  if (!el) return;
  if (el.value === '') return;                // let them clear and retype
  var val = parseInt(el.value, 10);
  if (isNaN(val)) return;                     // let them finish typing
  if (val > entry.availableQty) { val = entry.availableQty; el.value = val; }
  entry.qty = val;
  adjustedQtys[entry.reqId + '|' + entry.location] = val;
}
function blurQtyInput(key) {
  // Runs when the user leaves the field — enforce both bounds, commit final value.
  var entry = pickMap[key];
  if (!entry || entry.exhausted) return;
  var el = document.getElementById('pick-qty-' + key);
  if (!el) return;
  var val = parseInt(el.value, 10);
  if (isNaN(val) || val < 0) val = 0;
  else if (val > entry.availableQty) val = entry.availableQty;
  el.value = val; entry.qty = val;
  adjustedQtys[entry.reqId + '|' + entry.location] = val;
}
function handlePick(key) {
  var entry = pickMap[key];
  if (!entry || entry.exhausted) return;
  ws.send(JSON.stringify({ type: 'fulfill', reqId: entry.reqId, location: entry.location, qty: entry.qty }));
}
function lineClass(line) {
  var map = { 'Apollo':'apollo','APOLLO':'apollo','XF/PRO':'xf','Titan':'titan','TITAN':'titan','Vulcan':'vulcan','VULCAN':'vulcan','XR':'xr','MR1':'mr1','Shipping':'shipping','SHIPPING':'shipping' };
  return map[line] || 'apollo';
}

// ── Render queue ──────────────────────────────────────────────
function renderQueue() {
  if (document.activeElement && document.activeElement.classList.contains('adj-val')) return;
  var filtered = activeFilter === 'all' ? requests : requests.filter(function(r){ return String(r.line || '').toLowerCase() === String(activeFilter).toLowerCase(); });
  document.getElementById('total-count').textContent = requests.length;
  var queue = document.getElementById('queue');
  if (!filtered.length) { queue.innerHTML = '<div class="empty">— No Pending Requests —</div>'; return; }
  pickMap = {}; pickKey = 0;
  var html = filtered.map(function(r) {
    var qtyNeeded    = r.qty || 1;
    var qtyFulfilled = r.qtyFulfilled || 0;
    var qtyRemaining = Math.max(0, qtyNeeded - qtyFulfilled);
    var pri          = r.priority || 'low';
    var pickedLocs   = r.pickedLocations || {};
    var remainingHtml = '';
    if (qtyFulfilled > 0 && qtyRemaining > 0)  remainingHtml = '<span class="remaining-badge partial">'+qtyRemaining+' remaining</span>';
    else if (qtyFulfilled > 0 && qtyRemaining === 0) remainingHtml = '<span class="remaining-badge done">✓ Fulfilled</span>';
    var isEscalation = (r.qty || 1) === 0;
    var locHtml = '';
    var totalQty = 0;
    var locsLen  = 0;

    // ── Bundle branch: render complete-bundle counts per location ──
    if (r.isBundle) {
      var bLocs = r.allLocations || [];
      totalQty = bLocs.reduce(function(s,l){ return s + (parseInt(l.completeBundles||l.quantity)||0); }, 0);
      locsLen  = bLocs.length;
      if (!bLocs.length || totalQty === 0) {
        locHtml = '<div style="background:#2d0808;border:1px solid #7f1d1d;border-radius:6px;padding:12px 14px;font-size:13px;color:#f87171;font-weight:700;">⚠ No complete bundles available — check individual parts</div>';
      } else {
        locHtml = bLocs.map(function(l) {
          var available = parseInt(l.completeBundles || l.quantity) || 0;
          if (available === 0) {
            var missing = l.limitingChild ? ' (missing '+esc(l.limitingChild)+')' : '';
            return '<div class="loc-row exhausted"><div class="loc-top"><span class="loc-code">'+esc(l.location)+'</span><span class="loc-qty-txt low">0 complete bundles'+missing+'</span></div></div>';
          }
          var key    = pickKey++;
          var adjKey = r.id + '|' + l.location;
          var defaultQty = Math.min(qtyRemaining, available);
          var initQty = adjustedQtys[adjKey] !== undefined ? adjustedQtys[adjKey] : defaultQty;
          pickMap[key] = { reqId: r.id, location: l.location, qty: initQty, availableQty: available, exhausted: false };
          var alreadyPicked = pickedLocs[l.location] || 0;
          var pickedNote = alreadyPicked > 0 ? '<div class="picked-from-note">✓ '+alreadyPicked+' bundle'+(alreadyPicked===1?'':'s')+' already picked from this location</div>' : '';
          return '<div class="loc-row" style="border-left:3px solid #6d28d9"><div class="loc-top"><span class="loc-code">'+esc(l.location)+'</span>'+
            '<span class="loc-qty-txt '+(available < qtyRemaining?'low':'ok')+'">'+(available < qtyRemaining?'⚠ ':'')+available+' complete bundle'+(available===1?'':'s')+'</span></div>'+
            '<div class="loc-pick-row"><span class="pick-label">Picking:</span>'+
            '<button class="adj-btn" onclick="adjQty('+key+',-1)">−</button>'+
            '<input type="number" class="adj-val" id="pick-qty-'+key+'" value="'+initQty+'" min="0" max="'+available+'" inputmode="numeric" oninput="handleQtyInput('+key+')" onblur="blurQtyInput('+key+')" onchange="blurQtyInput('+key+')">'+
            '<button class="adj-btn" onclick="adjQty('+key+',1)">+</button>'+
            '<button class="pick-btn active" onclick="handlePick('+key+')">✓ Picked</button></div>'+pickedNote+'</div>';
        }).join('');
      }
    } else {
      // ── Regular-part branch (unchanged) ──
      var locs = getLocsForPart(r.partNum);
      totalQty = locs.reduce(function(s,l){ return s + (parseInt(l.quantity)||0); }, 0);
      locsLen  = locs.length;
      locHtml = isEscalation
        ? '<div style="background:#2d0808;border:1px solid #7f1d1d;border-radius:6px;padding:12px 14px;font-size:13px;color:#f87171;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;">⚠ Out of Stock — No inventory available to fulfill this request</div>'
        : locs.length ? locs.map(function(l) {
        var lq = parseInt(l.quantity) || 0;
        var alreadyPicked = pickedLocs[l.location] || 0;
        var isExhausted   = lq === 0 && alreadyPicked > 0;
        var key    = pickKey++;
        var adjKey = r.id + '|' + l.location;
        var defaultQty = Math.min(qtyRemaining, lq);
        if (defaultQty < 1 && !isExhausted) defaultQty = qtyRemaining;
        if (isExhausted) defaultQty = 0;
        var initQty = adjustedQtys[adjKey] !== undefined ? adjustedQtys[adjKey] : defaultQty;
        if (isExhausted) initQty = 0;
        pickMap[key] = { reqId: r.id, location: l.location, qty: initQty, availableQty: lq, exhausted: isExhausted };
        var pickedNote = alreadyPicked > 0 ? '<div class="picked-from-note">✓ '+alreadyPicked+' already picked from this location</div>' : '';
        if (isExhausted) {
          return '<div class="loc-row exhausted"><div class="loc-top"><span class="loc-code">'+esc(l.location)+'</span><span class="loc-qty-txt low">0 in stock</span></div>'+
            '<div class="loc-pick-row"><span class="pick-label">Exhausted</span><button class="adj-btn" disabled>−</button>'+
            '<input type="number" class="adj-val" id="pick-qty-'+key+'" value="0" disabled>'+
            '<button class="adj-btn" disabled>+</button><button class="pick-btn exhausted-btn">Picked</button></div>'+pickedNote+'</div>';
        }
        return '<div class="loc-row"><div class="loc-top"><span class="loc-code">'+esc(l.location)+'</span>'+
          '<span class="loc-qty-txt '+(lq < qtyRemaining?'low':'ok')+'">'+(lq < qtyRemaining?'⚠ ':'')+lq+' in stock</span></div>'+
          '<div class="loc-pick-row"><span class="pick-label">Picking:</span>'+
          '<button class="adj-btn" onclick="adjQty('+key+',-1)">−</button>'+
          '<input type="number" class="adj-val" id="pick-qty-'+key+'" value="'+initQty+'" min="0" max="'+lq+'" inputmode="numeric" oninput="handleQtyInput('+key+')" onblur="blurQtyInput('+key+')" onchange="blurQtyInput('+key+')">'+
          '<button class="adj-btn" onclick="adjQty('+key+',1)">+</button>'+
          '<button class="pick-btn active" onclick="handlePick('+key+')">✓ Picked</button></div>'+pickedNote+'</div>';
      }).join('') : '<div style="font-size:12px;color:#4b5563;font-style:italic;padding:6px 0;">No warehouse location on file</div>';
    }

    var escalationBadge = isEscalation ? '<span class="escalation-badge">Out of Stock</span>' : '';
    var bundleBadge = r.isBundle ? '<span class="pri-badge" style="background:#1e1535;color:#a78bfa">BUNDLE</span>' : '';
    var unitLabel = r.isBundle
      ? (' Bundle' + (qtyNeeded > 1 ? 's' : ''))
      : (r.unit && r.unit !== 'Part' ? ' ' + r.unit + (qtyNeeded > 1 ? 's' : '') : '');
    var elapsedHtml = r.submittedAt ? '<span class="req-elapsed" data-submitted="'+r.submittedAt+'">'+fmtElapsed(r.submittedAt)+'</span>' : '';
    var posHtml = r.queuePosition ? '<span class="req-queue-pos">#'+r.queuePosition+'</span>' : '';
    var partDisplay = r.isBundle
      ? esc(r.bundleName || r.partName || '')
      : esc(r.partName || r.text || '');
    var totalLabel = r.isBundle ? 'Total complete bundles' : 'Warehouse total';
    var epicorBadge = (!r.isBundle && r.partNum)
      ? '<span class="stock-info">Factory on-hand: <span>'+epicorLabel(r.partNum)+'</span></span>'
      : '';
    return '<div class="req-card">'+
      '<div class="req-card-header">'+
        posHtml+
        '<span class="line-tag '+lineClass(r.line)+'">'+esc(r.line)+'</span>'+
        (r.station ? '<span class="req-station">'+esc(r.station)+'</span>' : '')+
        '<span class="pri-badge '+pri+'">'+pri+'</span>'+
        bundleBadge+
        escalationBadge+
        '<span class="req-time">'+r.time+'</span>'+
        elapsedHtml+
      '</div>'+
      '<div class="req-body">'+
        '<div class="req-part">'+partDisplay+'</div>'+
        (!r.isBundle && r.partNum ? '<div class="req-partnum">'+esc(r.partNum)+'</div>' : '')+
        '<div class="req-meta">'+
          '<span class="qty-badge">Qty needed: '+qtyNeeded+unitLabel+'</span>'+
          remainingHtml+
          (locsLen ? '<span class="stock-info">'+totalLabel+': <span>'+totalQty+'</span></span>' : '')+
          epicorBadge+
        '</div>'+
        '<div class="loc-section">'+locHtml+'</div>'+
      '</div></div>';
  }).join('');
  queue.innerHTML = html;
}

// ── Recently completed picks ──────────────────────────────────
function renderRecentPicks() {
  var sec = document.getElementById('recent-picks-section');
  var list = document.getElementById('recent-picks-list');
  if (!recentPicks.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = recentPicks.map(function(p) {
    return '<div class="recent-pick-card">'+
      '<div class="recent-pick-part">'+esc(p.partNum)+' — '+esc(p.partName)+'</div>'+
      '<div class="recent-pick-meta">'+
        '<span>Qty: '+p.qty+'</span>'+
        '<span class="recent-pick-loc">'+esc(p.location)+'</span>'+
        '<span>'+esc(p.line)+'</span>'+
        '<span>'+p.time+'</span>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ── Stow search ───────────────────────────────────────────────
window.allStowParts = [];
Promise.all([
  fetch('/api/bom').then(function(r){ return r.json(); }).catch(function(){ return {}; }),
  fetch('/api/locations').then(function(r){ return r.json(); }).catch(function(){ return {}; }),
  fetch('/api/orphans').then(function(r){ return r.json(); }).catch(function(){ return {}; }),
  fetch('/api/bundles').then(function(r){ return r.json(); }).catch(function(){ return {}; })
]).then(function(results) {
  var seen = {}, combined = [];
  function addParts(arr) {
    if (!Array.isArray(arr)) return;
    arr.forEach(function(p) {
      var pn = String(p.partNum || '').trim(), pa = String(p.partName || p.partDescription || '').trim();
      var key = pn.toLowerCase();
      if (!key || seen[key]) return;
      seen[key] = true; combined.push({ partNum: pn, partName: pa });
    });
  }
  addParts(results[0].bomList);
  addParts(results[1].locations);
  addParts(results[2].orphanParts);
  combined.sort(function(a, b) { return a.partNum.localeCompare(b.partNum, undefined, { numeric: true, sensitivity: 'base' }); });

  // Append bundles at the end. Bundle entries are identified by isBundle=true.
  if (results[3] && Array.isArray(results[3].bundles)) {
    results[3].bundles.forEach(function(b) {
      combined.push({
        partNum:  '',
        partName: b.name,
        isBundle: true,
        bundleName: b.name,
        bundleChildren: b.children,
      });
    });
  }

  window.allStowParts = combined;
  console.log('Stow parts ready:', window.allStowParts.length);
});

document.getElementById('stow-search').addEventListener('input', function() {
  var q = this.value.trim();
  var resultsEl = document.getElementById('stow-results');
  if (!q) { resultsEl.style.display = 'none'; resultsEl.innerHTML = ''; return; }
  var results = (window.allStowParts || []).filter(function(i) {
    return (i.partNum||'').toLowerCase().includes(q.toLowerCase()) || (i.partName||'').toLowerCase().includes(q.toLowerCase());
  }).slice(0, 20);
  if (!results.length) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:#4b5563;text-align:center;">No parts found</div>';
    return;
  }
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = results.map(function(i) {
    if (i.isBundle) {
      return '<div class="stow-result-item" onclick="selectStowBundle(\''+esc(i.bundleName)+'\')">' +
        '<div class="stow-result-pn" style="color:#a78bfa">BUNDLE</div><div class="stow-result-pa">'+esc(i.bundleName)+'</div></div>';
    }
    return '<div class="stow-result-item" onclick="selectStowPart(\''+esc(i.partNum)+'\',\''+esc(i.partName)+'\')">' +
      '<div class="stow-result-pn">'+esc(i.partNum)+'</div><div class="stow-result-pa">'+esc(i.partName)+'</div></div>';
  }).join('');
});

function selectStowPart(pn, pa) {
  stowSelected = { partNum: pn, partName: pa, isBundle: false };
  document.getElementById('stow-search').value = '';
  document.getElementById('stow-results').style.display = 'none';
  document.getElementById('stow-selected').style.display = 'block';
  document.getElementById('stow-sel-pn').textContent = pn;
  document.getElementById('stow-sel-pa').textContent = pa;

  // Show existing locations for this part, with Factory on-hand banner above
  var locs = locationsData.filter(function(l) { return l.partNum.toLowerCase() === pn.toLowerCase(); });
  var existEl = document.getElementById('existing-locs');
  var listEl  = document.getElementById('existing-locs-list');
  var epicorBanner = '<div id="stow-epicor" style="font-size:11px;font-weight:600;color:#9ca3af;padding:4px 0 8px;letter-spacing:0.04em;">Factory on-hand: '+epicorLabel(pn)+'</div>';
  if (locs.length) {
    existEl.style.display = 'block';
    listEl.innerHTML = epicorBanner + locs.map(function(l) {
      return '<div class="existing-loc-row">'+
        '<span class="existing-loc-code">'+esc(l.location)+'</span>'+
        '<span class="existing-loc-qty">'+l.quantity+' in stock</span>'+
      '</div>';
    }).join('');
  } else {
    existEl.style.display = 'block';
    listEl.innerHTML = epicorBanner + '<div style="font-size:12px;color:#4b5563;font-style:italic;padding:4px 0;">No existing locations on file</div>';
  }
}

function selectStowBundle(bundleName) {
  var b = (window.allStowParts || []).find(function(x){ return x.isBundle && x.bundleName === bundleName; });
  if (!b) return;
  stowSelected = {
    partNum:  '',
    partName: bundleName,
    isBundle: true,
    bundleName: bundleName,
    bundleChildren: b.bundleChildren,
  };
  document.getElementById('stow-search').value = '';
  document.getElementById('stow-results').style.display = 'none';
  document.getElementById('stow-selected').style.display = 'block';
  document.getElementById('stow-sel-pn').textContent = 'BUNDLE';
  document.getElementById('stow-sel-pa').textContent = bundleName;

  // Show what a single bundle contains as the "existing locations" area
  var existEl = document.getElementById('existing-locs');
  var listEl  = document.getElementById('existing-locs-list');
  existEl.style.display = 'block';
  var childRows = (b.bundleChildren || []).map(function(c) {
    return '<div class="existing-loc-row">'+
      '<span class="existing-loc-code">'+esc(c.partNum)+'</span>'+
      '<span class="existing-loc-qty">×'+c.qty+' per bundle</span>'+
    '</div>';
  }).join('');
  listEl.innerHTML = '<div style="font-size:10px;color:#6b7280;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;">Contents per bundle</div>' +
    (childRows || '<div style="font-size:12px;color:#4b5563;font-style:italic;">No children defined</div>');
}

function clearStowPart() {
  stowSelected = null;
  document.getElementById('stow-selected').style.display = 'none';
  document.getElementById('existing-locs').style.display = 'none';
  document.getElementById('stow-search').value = '';
}

function changeQty(delta) {
  var el = document.getElementById('qty-stow');
  el.value = Math.max(1, (parseInt(el.value) || 1) + delta);
}

function stowPart() {
  var location = document.getElementById('location-sel').value.trim().toUpperCase();
  var qty      = Math.max(1, parseInt(document.getElementById('qty-stow').value) || 1);
  if (!stowSelected) { showResult(false, 'Please search and select a part'); return; }
  if (!location)     { showResult(false, 'Please enter a shelf location'); return; }
  var btn = document.getElementById('stow-btn');
  btn.disabled = true; btn.textContent = 'Stowing...';
  if (stowSelected.isBundle) {
    ws.send(JSON.stringify({
      type:       'stow',
      location:   location,
      bundleName: stowSelected.bundleName,
      qty:        qty,
    }));
  } else {
    ws.send(JSON.stringify({
      type:     'stow',
      location: location,
      partNum:  stowSelected.partNum,
      partName: stowSelected.partName,
      qty:      qty,
    }));
  }
  setTimeout(function() {
    if (btn.disabled) { btn.disabled = false; btn.textContent = '📥 Stow Part'; showResult(false, 'No response — check connection'); }
  }, 8000);
}

function handleStowResult(msg) {
  var btn = document.getElementById('stow-btn');
  btn.disabled = false; btn.textContent = '📥 Stow Part';
  if (msg.success) {
    var location = document.getElementById('location-sel').value;
    var qty      = parseInt(document.getElementById('qty-stow').value) || 1;
    showResult(true, msg.message || 'Stowed successfully');
    recentStows.unshift({ location: location, partNum: stowSelected ? stowSelected.partNum : '', partName: stowSelected ? stowSelected.partName : '', qty: qty, time: new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) });
    if (recentStows.length > 10) recentStows.pop();
    renderRecent();
    clearStowPart();
    document.getElementById('location-sel').value = '';
    document.getElementById('qty-stow').value = '1';
    loadLocations();
  } else {
    showResult(false, msg.message || 'Stow failed');
  }
}

function showResult(success, message) {
  var el = document.getElementById('result-flash');
  el.className = 'result-flash ' + (success ? 'success' : 'error');
  el.textContent = (success ? '✓ ' : '✗ ') + message;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 4000);
}

function renderRecent() {
  var el = document.getElementById('recent-list');
  if (!recentStows.length) { el.innerHTML = ''; return; }
  el.innerHTML = recentStows.map(function(s) {
    return '<div class="recent-item"><div class="recent-part">'+esc(s.partNum)+' — '+esc(s.partName)+'</div>'+
      '<div class="recent-meta">'+esc(s.location)+' · Qty: '+s.qty+' · '+s.time+'</div></div>';
  }).join('');
}

// ── Transfer tab ──────────────────────────────────────────────
var transferPart      = null;  // { partNum, partName }
var transferFromLoc   = null;  // { location, quantity }

function lineClassT(line) { return lineClass(line); }

function renderTransferResults(q) {
  var container = document.getElementById('transfer-results');
  if (!q) { container.innerHTML = '<div class="search-empty">— Search a part or bin location to transfer —</div>'; return; }
  var ql = q.toLowerCase();
  var seen = {}, matches = [];

  // Location code search — check all location entries for matching bin codes
  locationsData.forEach(function(l) {
    var loc = String(l.location || '').toLowerCase();
    if (!loc.includes(ql)) return;
    var key = String(l.partNum || '').toLowerCase();
    if (!key || seen[key]) return;
    seen[key] = true;
    matches.push({ partNum: l.partNum, partName: l.partName });
  });

  // Part # and description search
  locationsData.forEach(function(l) {
    var pn = String(l.partNum || '').trim(), pa = String(l.partName || '').trim(), key = pn.toLowerCase();
    if (!key || seen[key]) return;
    if (!key.includes(ql) && !pa.toLowerCase().includes(ql)) return;
    seen[key] = true; matches.push({ partNum: pn, partName: pa });
  });
  (window.allStowParts || []).forEach(function(p) {
    if (p.isBundle) return;  // bundles handled separately below
    var key = (p.partNum||'').toLowerCase();
    if (!key || seen[key]) return;
    if (!key.includes(ql) && !(p.partName||'').toLowerCase().includes(ql)) return;
    seen[key] = true; matches.push({ partNum: p.partNum, partName: p.partName });
  });

  matches.sort(function(a, b) { return a.partNum.localeCompare(b.partNum, undefined, { numeric: true, sensitivity: 'base' }); });
  if (!matches.length) { container.innerHTML = '<div class="search-empty">— No parts found —</div>'; return; }

  container.innerHTML = matches.slice(0, 20).map(function(m) {
    var locs  = locationsData.filter(function(l) { return l.partNum.toLowerCase() === m.partNum.toLowerCase(); });
    var total = locs.reduce(function(s,l){ return s+(parseInt(l.quantity)||0); }, 0);
    var lineSet = {};
    Object.keys(inventoryData).forEach(function(grp) {
      (inventoryData[grp]||[]).forEach(function(item) {
        if (item.partNum.toLowerCase() === m.partNum.toLowerCase()) lineSet[(item.line||grp).toUpperCase()] = item.line||grp;
      });
    });
    if (orphanData && orphanData.orphanParts) {
      orphanData.orphanParts.forEach(function(o) {
        if (o.partNum.toLowerCase() !== m.partNum.toLowerCase()) return;
        var lines = Array.isArray(o.assignedLines) ? o.assignedLines : (o.assignedLine ? [o.assignedLine] : []);
        lines.forEach(function(l){ if (l) lineSet[l.toUpperCase()] = l; });
      });
    }
    var lineKeys = Object.keys(lineSet);
    var lineTags = lineKeys.length
      ? lineKeys.map(function(k){ return '<span class="transfer-line-tag '+lineClassT(k)+'">'+esc(lineSet[k])+'</span>'; }).join('')
      : '<span class="transfer-line-tag unassigned">Unassigned</span>';

    var locRows = locs.length ? locs.map(function(l) {
      var qty = parseInt(l.quantity) || 0;
      var isSelected = transferFromLoc && transferFromLoc.location === l.location && transferPart && transferPart.partNum === m.partNum;
      return '<div class="transfer-loc-row">'+
        '<div class="transfer-loc-top">'+
          '<span class="transfer-loc-code">'+esc(l.location)+'</span>'+
          '<span class="transfer-loc-qty '+(qty>0?'ok':'low')+'">'+qty+' in stock</span>'+
          (qty > 0 ? '<button class="transfer-from-btn'+(isSelected?' selected':'')+'" onclick="selectTransferFrom(\''+esc(m.partNum)+'\',\''+esc(m.partName)+'\',\''+esc(l.location)+'\','+qty+')">'+
            (isSelected ? '✓ Selected' : 'Transfer From')+'</button>' : '')+
        '</div>'+
      '</div>';
    }).join('') : '<div class="transfer-loc-out">No warehouse locations on file</div>';

    return '<div class="transfer-result-card">'+
      '<div class="transfer-result-header">'+
        '<div class="transfer-result-pn">'+esc(m.partNum)+'</div>'+
        '<div class="transfer-result-pa">'+esc(m.partName)+'</div>'+
      '</div>'+
      '<div class="transfer-result-body">'+
        '<div class="transfer-lines">'+lineTags+'</div>'+
        '<div style="font-size:11px;font-weight:600;color:#9ca3af;margin:4px 0 6px;letter-spacing:0.04em;">Factory on-hand: <span style="color:#fff">'+epicorLabel(m.partNum)+'</span></div>'+
        locRows+
        (locs.length > 1 ? '<div class="transfer-total">Total: '+total+' across '+locs.length+' locations</div>' : '')+
      '</div>'+
    '</div>';
  }).join('') + '<div id="transfer-form-anchor"></div>';

  if (transferPart && transferFromLoc) renderTransferForm();
}

function selectTransferFrom(pn, pa, location, qty) {
  transferPart    = { partNum: pn, partName: pa };
  transferFromLoc = { location: location, quantity: qty };
  renderTransferResults(document.getElementById('transfer-search-input').value.trim().toLowerCase());
}

function renderTransferForm() {
  var anchor = document.getElementById('transfer-form-anchor');
  if (!anchor) return;
  var maxQty = transferFromLoc.quantity;
  anchor.innerHTML =
    '<div class="transfer-form">'+
      '<div class="transfer-form-title">↔ Transfer — '+esc(transferPart.partNum)+'</div>'+
      '<div class="transfer-from-info">'+
        '<div>'+
          '<div class="transfer-from-label">From location</div>'+
          '<div class="transfer-from-loc">'+esc(transferFromLoc.location)+'</div>'+
        '</div>'+
        '<div class="transfer-from-avail">'+maxQty+' available</div>'+
      '</div>'+
      '<div class="transfer-qty-row">'+
        '<span class="transfer-qty-label">Qty to move</span>'+
        '<input class="transfer-qty-input" type="number" id="transfer-qty" inputmode="numeric" min="1" max="'+maxQty+'" value="'+Math.min(maxQty,1)+'" oninput="clampTransferQty('+maxQty+')" onblur="blurTransferQty('+maxQty+')"/>'+
      '</div>'+
      '<div class="transfer-dest-label">Destination location</div>'+
      '<input class="transfer-dest-input" type="text" id="transfer-dest" placeholder="e.g. 02-B3-A" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>'+
      '<button class="transfer-confirm-btn" id="transfer-confirm-btn" onclick="confirmTransfer()">↔ Confirm Transfer</button>'+
      '<button style="width:100%;margin-top:8px;padding:10px;border-radius:6px;border:1px solid #374151;background:#1f2937;color:#6b7280;font-size:12px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em;" onclick="cancelTransfer()">Cancel</button>'+
    '</div>';
}

function clampTransferQty(max) {
  // Fires on every keystroke — allow empty/mid-edit, only enforce the MAX here.
  // Minimum is enforced on blur so the user can freely clear the field and retype.
  var el = document.getElementById('transfer-qty');
  if (!el) return;
  if (el.value === '') return;                // let them clear and retype
  var v = parseInt(el.value, 10);
  if (isNaN(v)) return;                       // let them finish typing
  if (v > max) el.value = max;
}
function blurTransferQty(max) {
  // Runs when the user leaves the field — enforce both bounds here.
  var el = document.getElementById('transfer-qty');
  if (!el) return;
  var v = parseInt(el.value, 10);
  if (isNaN(v) || v < 1) el.value = 1;
  else if (v > max) el.value = max;
}

function cancelTransfer() {
  transferPart = null; transferFromLoc = null;
  renderTransferResults(document.getElementById('transfer-search-input').value.trim().toLowerCase());
}

function confirmTransfer() {
  var qty  = parseInt(document.getElementById('transfer-qty').value) || 1;
  var dest = document.getElementById('transfer-dest').value.trim().toUpperCase();
  if (!dest) { document.getElementById('transfer-dest').focus(); return; }
  if (dest.toLowerCase() === transferFromLoc.location.toLowerCase()) {
    showTransferFlash(false, 'Destination must be different from source location'); return;
  }
  if (qty < 1 || qty > transferFromLoc.quantity) {
    showTransferFlash(false, 'Quantity must be between 1 and '+transferFromLoc.quantity); return;
  }
  var btn = document.getElementById('transfer-confirm-btn');
  btn.disabled = true; btn.textContent = 'Transferring...';
  ws.send(JSON.stringify({
    type:        'transfer',
    partNum:     transferPart.partNum,
    partName:    transferPart.partName,
    fromLocation: transferFromLoc.location,
    toLocation:  dest,
    qty:         qty,
  }));
  setTimeout(function() {
    if (btn && btn.disabled) { btn.disabled = false; btn.textContent = '↔ Confirm Transfer'; showTransferFlash(false, 'No response — check connection'); }
  }, 10000);
}

function handleTransferResult(msg) {
  var btn = document.getElementById('transfer-confirm-btn');
  if (btn) { btn.disabled = false; btn.textContent = '↔ Confirm Transfer'; }
  if (msg.success) {
    showTransferFlash(true, msg.message || 'Transfer complete');
    transferPart = null; transferFromLoc = null;
    loadLocations();
    setTimeout(function() {
      renderTransferResults(document.getElementById('transfer-search-input').value.trim().toLowerCase());
    }, 1500);
  } else {
    showTransferFlash(false, msg.message || 'Transfer failed');
  }
}

function showTransferFlash(success, message) {
  var el = document.getElementById('transfer-flash');
  el.className = 'transfer-flash ' + (success ? 'success' : 'error');
  el.textContent = (success ? '✓ ' : '✗ ') + message;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 4000);
}

document.getElementById('transfer-search-input').addEventListener('input', function() {
  transferPart = null; transferFromLoc = null;
  renderTransferResults(this.value.trim().toLowerCase());
});

// ── Clock ─────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
updateClock(); setInterval(updateClock, 1000);

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

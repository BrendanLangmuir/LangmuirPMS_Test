<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Warehouse Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #fff; font-family: system-ui, sans-serif; min-height: 100vh; padding: 24px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; }
  .brand { font-size: 20px; font-weight: 800; letter-spacing: 0.08em; }
  .brand span { color: #378ADD; }
  .clock { font-size: 16px; color: #aaa; font-weight: 600; }

  .summary { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .summary-card { background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 12px; padding: 12px 20px; text-align: center; min-width: 120px; }
  .summary-card .num { font-size: 32px; font-weight: 800; color: #EF9F27; }
  .summary-card .lbl { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid #333; background: #1a1a1a; color: #666; transition: all 0.2s; }
  .filter-btn.active { background: #378ADD; border-color: #378ADD; color: #fff; }
  .filter-btn:hover:not(.active) { border-color: #555; color: #aaa; }

  .queue { display: flex; flex-direction: column; gap: 12px; }
  .empty { text-align: center; color: #444; font-size: 15px; padding: 60px 0; }

  .req-card { background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 14px; padding: 16px 18px; }
  .req-card.apollo { border-left: 4px solid #378ADD; }
  .req-card.xf     { border-left: 4px solid #9B6BCC; }
  .req-card.titan  { border-left: 4px solid #EF9F27; }
  .req-card.vulcan { border-left: 4px solid #E24B4A; }
  .req-card.xr     { border-left: 4px solid #639922; }
  .req-card.mr1    { border-left: 4px solid #378ADD; }

  .req-top     { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .req-line    { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #378ADD; }
  .req-station { font-size: 11px; color: #555; }
  .req-time    { font-size: 11px; color: #444; margin-left: auto; }
  .req-part    { font-size: 16px; font-weight: 700; color: #eee; margin-bottom: 2px; word-break: break-word; }
  .req-partnum { font-size: 12px; color: #666; margin-bottom: 8px; }

  .req-meta    { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .meta-lbl    { font-size: 12px; color: #555; }
  .meta-val    { font-size: 12px; color: #eee; font-weight: 600; margin-left: 4px; }
  .qty-badge   { background: #2a200a; border: 1px solid #EF9F2766; color: #EF9F27; font-size: 12px; font-weight: 700; border-radius: 8px; padding: 3px 10px; }

  .loc-row     { display: flex; align-items: center; gap: 10px; background: #111; border-radius: 10px; padding: 10px 12px; margin-top: 6px; }
  .loc-name    { font-size: 14px; font-weight: 700; color: #EF9F27; flex: 1; }
  .loc-qty     { font-size: 13px; font-weight: 600; min-width: 60px; text-align: right; }
  .loc-qty.ok  { color: #97C459; }
  .loc-qty.low { color: #E24B4A; }
  .pick-btn    { background: #0d2a0d; border: 1.5px solid #63992266; color: #97C459; font-size: 13px; font-weight: 700; border-radius: 10px; padding: 8px 16px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .pick-btn:hover  { background: #1a3a1a; }
  .pick-btn:active { transform: scale(0.96); }

  .no-loc { font-size: 12px; color: #555; font-style: italic; margin-top: 6px; padding: 8px 0; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand"><span>LANGMUIR</span> Warehouse Picker</div>
  <div class="clock" id="clock"></div>
</div>

<div class="summary">
  <div class="summary-card"><div class="num" id="total-count">0</div><div class="lbl">Total Requests</div></div>
  <div class="summary-card"><div class="num" id="apollo-count">0</div><div class="lbl">Apollo</div></div>
  <div class="summary-card"><div class="num" id="other-count">0</div><div class="lbl">Other Lines</div></div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all')"     id="filter-all">All Lines</button>
  <button class="filter-btn"        onclick="setFilter('Apollo')"  id="filter-Apollo">Apollo</button>
  <button class="filter-btn"        onclick="setFilter('XF/PRO')"  id="filter-XF/PRO">XF/PRO</button>
  <button class="filter-btn"        onclick="setFilter('TITAN')"   id="filter-TITAN">Titan</button>
  <button class="filter-btn"        onclick="setFilter('VULCAN')"  id="filter-VULCAN">Vulcan</button>
  <button class="filter-btn"        onclick="setFilter('XR')"      id="filter-XR">XR</button>
  <button class="filter-btn"        onclick="setFilter('MR1')"     id="filter-MR1">MR1</button>
</div>

<div class="queue" id="queue">
  <div class="empty">No pending requests</div>
</div>

<script>
// Store location data keyed by a simple numeric key to avoid any string passing issues
const pickMap = {};
let pickMapKey = 0;

// ── WebSocket ─────────────────────────────────────────────
const ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'?picker=1');
ws.onmessage = e => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'requests')  { requests = msg.requests; render(); }
  if (msg.type === 'locations') { locationsData = msg.locations; render(); }
};

// ── Polling fallback ──────────────────────────────────────
setInterval(async () => {
  try {
    const d = await (await fetch('/api/requests')).json();
    requests = d.requests; render();
  } catch {}
}, 3000);

// ── Load locations ────────────────────────────────────────
async function loadLocations() {
  try {
    const r = await fetch('/api/locations');
    const d = await r.json();
    if (d.success && d.locations) {
      locationsData = d.locations;
      render();
    }
  } catch(e) { console.error('Locations load failed:', e.message); }
}
loadLocations();
setInterval(loadLocations, 60000);

function getLocsForPart(partNum) {
  if (!partNum) return [];
  return locationsData.filter(l => l.partNum.toLowerCase() === partNum.toLowerCase());
}

// ── Filter ────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('filter-' + f);
  if (el) el.classList.add('active');
  render();
}

// ── Fulfill ───────────────────────────────────────────────
function fulfill(reqId, location) {
  ws.send(JSON.stringify({ type: 'fulfill', reqId, location }));
}

function handlePick(key) {
  const entry = pickMap[key];
  if (!entry) { console.error('pickMap entry not found:', key); return; }
  console.log('handlePick:', entry.reqId, entry.location);
  ws.send(JSON.stringify({ type: 'fulfill', reqId: entry.reqId, location: entry.location }));
}

function fulfillDirect(reqId, location) {
  console.log('fulfillDirect called: reqId=' + reqId + ' location=' + location);
  ws.send(JSON.stringify({ type: 'fulfill', reqId, location }));
}

function fulfillLoc(reqId, locIdx) {
  const req  = requests.find(r => r.id === reqId);
  if (!req) { console.error('Request not found:', reqId); return; }
  const locs = getLocsForPart(req.partNum);
  console.log('fulfillLoc called: reqId=' + reqId + ' locIdx=' + locIdx + ' locs=' + JSON.stringify(locs));
  if (!locs[locIdx]) { console.error('Location index not found:', locIdx); return; }
  const location = locs[locIdx].location;
  console.log('Sending fulfill with location:', location);
  ws.send(JSON.stringify({ type: 'fulfill', reqId, location }));
}

// ── Line color class ──────────────────────────────────────
function lineClass(line) {
  const map = { 'Apollo':'apollo','APOLLO':'apollo','XF/PRO':'xf','TITAN':'titan','VULCAN':'vulcan','XR':'xr','MR1':'mr1' };
  return map[line] || 'apollo';
}

// ── Render ────────────────────────────────────────────────
function render() {
  const filtered = activeFilter === 'all' ? requests : requests.filter(r => r.line === activeFilter);

  document.getElementById('total-count').textContent  = requests.length;
  document.getElementById('apollo-count').textContent = requests.filter(r => r.line === 'Apollo' || r.line === 'APOLLO').length;
  document.getElementById('other-count').textContent  = requests.filter(r => r.line !== 'Apollo' && r.line !== 'APOLLO').length;

  const queue = document.getElementById('queue');
  if (!filtered.length) {
    queue.innerHTML = '<div class="empty">No pending requests</div>';
    return;
  }

  queue.innerHTML = filtered.map(r => {
    const partLabel = (r.partNum && r.partName)
      ? r.partNum + ' — ' + r.partName
      : (r.text || '');
    const qtyNeeded = r.qty || 1;
    const locs      = getLocsForPart(r.partNum);
    const totalQty  = locs.reduce((s, l) => s + (parseInt(l.quantity) || 0), 0);

    const locRows = locs.length
      ? locs.map((l) => {
          const lq    = parseInt(l.quantity) || 0;
          const isLow = lq < qtyNeeded;
          const key   = pickMapKey++;
          pickMap[key] = { reqId: r.id, location: l.location };
          return '<div class="loc-row">' +
            '<span class="loc-name">📍 ' + esc(l.location) + '</span>' +
            '<span class="loc-qty ' + (isLow ? 'low' : 'ok') + '">' + (isLow ? '⚠️ ' : '') + lq + ' in stock</span>' +
            '<button class="pick-btn" onclick="handlePick(' + key + ')">✓ Pick</button>' +
            '</div>';
        }).join('')
      : '<div class="no-loc">No warehouse location found for this part</div>';

    return '<div class="req-card ' + lineClass(r.line) + '">' +
      '<div class="req-top">' +
        '<span class="req-line">' + esc(r.line) + '</span>' +
        (r.station ? '<span class="req-station">· ' + esc(r.station) + '</span>' : '') +
        '<span class="req-time">' + r.time + '</span>' +
      '</div>' +
      '<div class="req-part">' + esc(partLabel) + '</div>' +
      (r.partNum ? '<div class="req-partnum">' + esc(r.partNum) + '</div>' : '') +
      '<div class="req-meta">' +
        '<span class="meta-lbl">Total in stock:</span>' +
        '<span class="meta-val">' + (locs.length ? totalQty : '—') + '</span>' +
        '<span class="qty-badge">Qty needed: ' + qtyNeeded + '</span>' +
      '</div>' +
      locRows +
      '</div>';
  }).join('');
}

// ── Clock ─────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
updateClock(); setInterval(updateClock, 1000);

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>

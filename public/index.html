<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Langmuir PMS</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<!-- ════════════════════════════════════════════════════════════
     PMS v2 — unified app shell. One page, role-based screens:
     Board (Apollo/Titan) · Station · Warehouse · Line Request.
     Role is remembered per device; ?role=… deep-links for kiosks.
     See PMS_V2_DESIGN.md for the architecture.
     ════════════════════════════════════════════════════════════ -->
<div class="topbar">
  <span class="brand">LANGMUIR PMS</span>
  <span class="screen-title">Choose role</span>
  <span class="clock"></span>
  <button class="home-btn" id="home-btn">⌂ Roles</button>
</div>
<div class="conn-banner" id="conn-banner"></div>
<div id="screen-root"></div>
<div class="modal-overlay" id="modal-root"></div>
<div id="toast-wrap"></div>

<script src="/js/core.js"></script>
<script src="/js/board.js"></script>
<script src="/js/station.js"></script>
<script src="/js/warehouse.js"></script>
<script>
'use strict';
var ROLES = [
  { id: 'board-apollo', icon: '📊', name: 'Apollo Board',  desc: 'Takt, stations, holds, andon', ws: '?board=1&line=Apollo' },
  { id: 'board-titan',  icon: '📊', name: 'TITAN Board',   desc: 'Single-unit cycle board',      ws: '?board=1&line=Titan' },
  { id: 'station',      icon: '🛠', name: 'Station',       desc: 'My timer + part requests',     ws: '?board=1&line=Apollo' },
  { id: 'warehouse',    icon: '📦', name: 'Warehouse',     desc: 'Pick queue · stow · transfer', ws: '?picker=1' },
  { id: 'line',         icon: '⚙️', name: 'Line Request',  desc: 'Request parts for any line',   ws: '?line=1' },
];

var root = document.getElementById('screen-root');
var booted = false;

function showRolePicker() {
  setScreenTitle('Choose role');
  localStorage.removeItem('pms-role');
  root.innerHTML = '<div class="page"><div class="role-grid">' +
    ROLES.map(function(r) {
      return '<div class="role-card" data-r="' + r.id + '"><div class="icon">' + r.icon + '</div>' +
        '<div class="name">' + r.name + '</div><div class="desc">' + r.desc + '</div></div>';
    }).join('') + '</div></div>';
  root.querySelectorAll('.role-card').forEach(function(c) {
    c.onclick = function(){ enterRole(c.dataset.r, true); };
  });
}

function enterRole(roleId, remember) {
  var role = ROLES.find(function(r){ return r.id === roleId; });
  if (!role) return showRolePicker();
  if (remember) localStorage.setItem('pms-role', roleId);
  PMS.role = roleId;
  if (!booted) { PMS.connect(role.ws); booted = true; }
  if (roleId === 'board-apollo') initBoard(root, 'apollo');
  else if (roleId === 'board-titan') initBoard(root, 'titan');
  else if (roleId === 'station') initStation(root);
  else if (roleId === 'warehouse') initWarehouse(root);
  else if (roleId === 'line') initLine(root);
}

document.getElementById('home-btn').onclick = function() {
  // Changing role mid-session: a clean reload reconnects the WS with the
  // right query (picker vs board routing on the server).
  localStorage.removeItem('pms-role');
  location.href = '/';
};

/* Shared message wiring (all roles) */
PMS.on('requests', function(msg){ PMS.state.requests = msg.requests || []; });
PMS.on('locations', function(msg){ PMS.state.locations = msg.locations || []; });

startClock();
PMS.loadInventory();
PMS.loadPlaces();
setInterval(PMS.loadInventory, 5 * 60 * 1000);

var param = new URLSearchParams(location.search).get('role');
var saved = localStorage.getItem('pms-role');
if (param && ROLES.some(function(r){ return r.id === param; })) enterRole(param, true);
else if (saved && ROLES.some(function(r){ return r.id === saved; })) enterRole(saved, false);
else showRolePicker();
</script>
</body>
</html>
